name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mlm_hosting_saas
          POSTGRES_USER: mlm
          POSTGRES_PASSWORD: mlm_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mlm:mlm_dev_password@127.0.0.1:5433/mlm_hosting_saas
      NODE_ENV: test
      WEB_PORT: 5174
      TRUSTED_ORIGINS: http://localhost:5174,http://127.0.0.1:5174
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run db:migrate
      - run: npm run typecheck --workspace @mlm-hosting-saas/api
      - run: npm run typecheck --workspace @mlm-hosting-saas/web
      - run: npm run build --workspace @mlm-hosting-saas/web
      - run: npm run test:api
